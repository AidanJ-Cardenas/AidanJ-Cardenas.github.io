<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Deep dark gradient background */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #1e1e2f 0%, #0f0f12 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* The Glassmorphism Audio Box */
        .audio-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .audio-card:hover {
            transform: translateY(-5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Styling the audio player itself */
        audio {
            width: 320px;
            height: 45px;
            filter: invert(90%) hue-rotate(180deg) brightness(1.2); /* Colors the player to match dark mode */
            outline: none;
        }

        /* Optional Title styling inside the box */
        .audio-card h2 {
            color: #ffffff;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="audio-card">
        <h2>The Gospel Of Luke - Pastor Houston | April 15, 2026</h2>
        <audio controls>
            <source src="The Gospel Of Luke - Pastor Houston.m4a" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
    <p style="color: transparent">dh</p>
    <div class="audio-card">
        <h2>The Power of the Holy Spirit - Pastor Amilcar | April 22, 2026</h2>
        <audio controls>
            <source src="https://onedrive.live.com/?id=%2Fpersonal%2F7521489c371d93eb%2FDocuments%2FThe%20power%20of%20the%20holy%20spirit%20%2D%20Pastor%20Amilcar%2Em4a&parent=%2Fpersonal%2F7521489c371d93eb%2FDocuments" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>

</body>
</html>
