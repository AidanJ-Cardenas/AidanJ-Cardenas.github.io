<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ | THE VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html">AJ</a></div>
        <div class="nav-links"><a href="about.html">THE CREED</a></div>
    </nav>

    <header class="vault-header">
        <span class="batch-number reveal-up">CARDENAS COLLECTIVE</span>
        <h1 class="reveal-up main-title">Signature Series</h1>
        <!-- <div class="reveal-up gold-line"></div> -->
    </header>

    <section id="formula-list" class="list-section"></section>

    <script>
        const formulas = [
            { id: "01", name: "Josue", file: "josue.html" },
            { id: "02", name: "Lumberjack", file: "lumberjack.html" },
            { id: "03", name: "Morning Mist", file: "morning-mist.html" },
            { id: "04", name: "Spring Solstice", file: "spring-solstice.html" },
            { id: "05", name: "Summer Whisp", file: "summer-whisp.html" },
            { id: "06", name: "Butterfly's Sunset", file: "butterfly-sunset.html" },
            { id: "07", name: "Petal & Pine", file: "petal-pine.html" },
            { id: "08", name: "Drops of Dew", file: "drops-of-dew.html" },
            { id: "09", name: "Fairy's Cabin", file: "fairys-cabin.html" },
            { id: "10", name: "Cashmere Woods", file: "cashmere-woods.html" }
        ]; //

        const list = document.getElementById('formula-list');
        formulas.forEach(f => {
            list.innerHTML += `
                <a href="${f.file}" class="formula-link reveal-item">
                    <span class="formula-id">${f.id}</span>
                    <span class="formula-name">${f.name}</span>
                    <span class="formula-price">$15</span>
                </a>
            `;
        });

        gsap.to(".reveal-up", { opacity: 1, y: 0, duration: 1.5, stagger: 0.2, ease: "expo.out" });
        gsap.to(".reveal-item", { opacity: 1, x: 0, duration: 1, stagger: 0.1, delay: 0.5, ease: "power4.out" });
    </script>
</body>
</html>
